<nav class="navbar">
  <div class="navbar-container">
    
    <!-- Logo -->
    <div class="navbar-logo" (click)="navigateToDashboard()">
      <div class="logo-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">Supervisor<span class="logo-highlight">App</span></span>
    </div>

    <!-- Navigation Links -->
    <div class="navbar-links">
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9L12 3L21 9L12 15L3 9Z"/>
          <path d="M9 21V15L12 13L15 15V21"/>
        </svg>
        Dashboard
      </a>
      <a routerLink="/projects" routerLinkActive="active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
        Projets
      </a>
      <a routerLink="/tasks" routerLinkActive="active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        Tâches
      </a>
      <a routerLink="/reports" routerLinkActive="active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 20V10"/>
          <path d="M12 20V4"/>
          <path d="M6 20v-6"/>
        </svg>
        Rapports
      </a>
    </div>

    <!-- User Menu -->
    <div class="user-menu-container">
      <div class="user-menu-trigger" (click)="toggleUserMenu()">
        <div class="user-avatar">
          <span class="avatar-initials">{{ getUserInitials() }}</span>
        </div>
        <div class="user-info">
          <span class="user-name">{{ getFullName() }}</span>
          <span class="user-role">{{ getUserRole() }}</span>
        </div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>

      <!-- Dropdown Menu -->
      <div class="user-dropdown" [class.show]="showUserMenu">
        <div class="dropdown-header">
          <div class="dropdown-avatar">
            <span>{{ getUserInitials() }}</span>
          </div>
          <div class="dropdown-info">
            <div class="dropdown-name">{{ getFullName() }}</div>
            <div class="dropdown-email">{{ currentUser?.email }}</div>
            <div class="dropdown-role-badge">{{ getUserRole() }}</div>
          </div>
        </div>
        
        <div class="dropdown-divider"></div>
        
        <a class="dropdown-item" routerLink="/profile" (click)="closeUserMenu()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Mon profil
        </a>
        
        <a class="dropdown-item" routerLink="/settings" (click)="closeUserMenu()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62l.04-.04z"/>
          </svg>
          Paramètres
        </a>
        
        <div class="dropdown-divider"></div>
        
        <button class="dropdown-item logout" (click)="logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Déconnexion
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- Overlay pour fermer le menu -->
<div class="dropdown-overlay" *ngIf="showUserMenu" (click)="closeUserMenu()"></div>
