<!-- src/app/pages/login/forgot-password/forgot-password.html -->

<div class="forgot-page">

  <!-- CONTAINER CENTRAL -->
  <div class="forgot-container">
    <h1 class="title">Reset Password</h1>

    <!-- FORM EMAIL -->
    <form *ngIf="!showCodeForm"
          [formGroup]="emailForm"
          (ngSubmit)="sendCode()"
          class="form-step">

      <div class="input-group">
        <input type="email" formControlName="email" required>
        <label>Email address</label>
      </div>

      <!-- Message d'erreur pour email -->
      <div *ngIf="emailForm.get('email')?.invalid && emailForm.get('email')?.touched" class="error-message">
        <span *ngIf="emailForm.get('email')?.errors?.['required']">Email is required</span>
        <span *ngIf="emailForm.get('email')?.errors?.['email']">Please enter a valid email</span>
      </div>

      <button type="submit" class="btn-send" [disabled]="isLoading">
        <span *ngIf="!isLoading">Send Code</span>
        <span *ngIf="isLoading">Sending...</span>
      </button>
    </form>

    <!-- FORM CODE -->
    <div *ngIf="showCodeForm" class="form-step code-step">

      <p class="info-text">
        Code sent to <strong>{{email}}</strong>
      </p>

      <div class="timer-container">
        <span class="timer">{{countdown}}s</span>
        <div class="timer-bar" [style.width.%]="(countdown / 90) * 100"></div>
      </div>

      <form [formGroup]="codeForm" (ngSubmit)="verifyCode()">

        <div class="input-group">
          <input type="text" formControlName="code" required>
          <label>Verification code</label>
        </div>

        <!-- Message d'erreur pour code -->
        <div *ngIf="codeForm.get('code')?.invalid && codeForm.get('code')?.touched" class="error-message">
          <span *ngIf="codeForm.get('code')?.errors?.['required']">Verification code is required</span>
        </div>

        <button type="submit" class="btn-send" [disabled]="isLoading">
          <span *ngIf="!isLoading">Verify Code</span>
          <span *ngIf="isLoading">Verifying...</span>
        </button>

        <!-- Bouton Renvoyer le code -->
        <button type="button" class="btn-resend" (click)="resendCode()" [disabled]="isLoading">
          <span *ngIf="!isLoading">Resend Code</span>
          <span *ngIf="isLoading">Sending...</span>
        </button>
      </form>
    </div>
  </div>

  <!-- ALERT -->
  <div *ngIf="showAlert" class="alert-box" [ngClass]="alertColor" (click)="onAlertClick()">
    <span class="icon">⚡</span>
    {{ alertMessage }}
  </div>

</div>
